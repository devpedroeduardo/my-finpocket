name: CI / E2E Tests

# Define quando o robô vai trabalhar
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
    - name: Baixar o código do repositório
      uses: actions/checkout@v4

    - name: Configurar o Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20 # Versão estável do Node

    - name: Instalar dependências (npm install)
      run: npm install

    - name: Instalar navegadores do Playwright
      run: npx playwright install --with-deps

    - name: Rodar testes E2E do Playwright
      run: npx playwright test
      env:
        # Injetamos as variáveis do Supabase aqui para o teste não quebrar na nuvem
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

    - name: Salvar relatório de testes em caso de erro
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30